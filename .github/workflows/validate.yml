name: Terraform Validate and Lint

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  # ===========================================================================
  # JSON Schema Validation (NEW in v1.5.0)
  # ===========================================================================
  schema-validation:
    name: JSON Schema Validation
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install jsonschema
        run: pip install jsonschema

      - name: Validate bot_config.json files
        run: |
          echo "🔍 Validating JSON schema for all examples..."
          
          FAILURES=0
          
          for example in examples/*/; do
            if [ -f "$example/bot_config.json" ]; then
              echo "----------------------------------------"
              echo "📁 Validating: $example"
              
              if python3 validate_schema.py "$example/bot_config.json" schema/bot_config_schema.json; then
                echo "✅ Schema valid"
              else
                echo "❌ Schema validation failed"
                FAILURES=$((FAILURES + 1))
              fi
            else
              echo "⚠️  No bot_config.json found in $example (skipping)"
            fi
          done
          
          echo ""
          echo "========================================"
          if [ $FAILURES -ne 0 ]; then
            echo "❌ $FAILURES schema validation(s) failed"
            exit 1
          else
            echo "✅ All schema validations passed"
          fi

  # ===========================================================================
  # TFLint
  # ===========================================================================
  tflint:
    name: TFLint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: terraform-linters/setup-tflint@v4
        with:
          tflint_version: latest

      - name: Show TFLint version
        run: tflint --version

      - name: Init TFLint
        run: tflint --init

      - name: Run TFLint (root)
        run: tflint --format compact

      - name: Run TFLint (modules)
        run: |
          for dir in modules/*/; do
            echo "========================================"
            echo "📦 Linting: $dir"
            echo "----------------------------------------"
            (cd "$dir" && tflint --format compact)
          done

  # ===========================================================================
  # Terraform Validation
  # ===========================================================================
  validate:
    name: Terraform Validate
    runs-on: ubuntu-latest
    needs: [schema-validation]  # Run after schema validation passes

    strategy:
      matrix:
        terraform_version: ["1.5.7", "1.9.8"]
        module:
          - "."
          - modules/lexv2models
          - modules/cloudwatch-logs
          - modules/lambda-fulfillment
          - modules/conversation-logs
          - examples/lex-only
          - examples/lex-with-versioning
          - examples/lex-with-building
          - examples/lex-with-cloudwatch-logs
          - examples/lex-with-lambda
          - examples/lex-with-lambda-and-cloudwatch-logs
          - examples/lex-production-ready

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ matrix.terraform_version }}

      - name: Terraform fmt check
        run: terraform fmt -check -recursive
        working-directory: ${{ matrix.module }}

      - name: Terraform init
        run: terraform init -backend=false
        working-directory: ${{ matrix.module }}

      - name: Terraform validate
        run: terraform validate
        working-directory: ${{ matrix.module }}

  # ===========================================================================
  # Lambda Code Validation
  # ===========================================================================
  validate-lambda:
    name: Validate Lambda Code
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Check Python syntax (all Lambda functions)
        run: |
          echo "🔍 Validating Python Lambda functions..."
          
          FAILURES=0
          
          # Find all Lambda Python files
          for lambda_file in $(find examples -name "index.py" -path "*/lambda/*"); do
            echo "----------------------------------------"
            echo "📄 Checking: $lambda_file"
            
            if python -m py_compile "$lambda_file"; then
              echo "✅ Syntax valid"
            else
              echo "❌ Syntax error"
              FAILURES=$((FAILURES + 1))
            fi
          done
          
          echo ""
          echo "========================================"
          if [ $FAILURES -ne 0 ]; then
            echo "❌ $FAILURES Lambda validation(s) failed"
            exit 1
          else
            echo "✅ All Lambda functions validated"
          fi

      - name: Run basic Lambda import tests
        run: |
          echo "🔍 Testing Lambda imports..."
          
          for lambda_dir in $(find examples -type d -name "lambda"); do
            for handler_dir in "$lambda_dir"/*/; do
              if [ -f "$handler_dir/index.py" ]; then
                echo "----------------------------------------"
                echo "📦 Testing: $handler_dir"
                
                cd "$handler_dir"
                
                # Test if the module can be imported
                python3 -c "import index; print('✅ Import successful')" || echo "⚠️  Import warning (may need dependencies)"
                
                cd - > /dev/null
              fi
            done
          done

  # ===========================================================================
  # Summary
  # ===========================================================================
  success:
    name: All Checks Passed
    runs-on: ubuntu-latest
    needs: [schema-validation, tflint, validate, validate-lambda]
    
    steps:
      - name: Success
        run: |
          echo "========================================"
          echo "✅ All validation checks passed!"
          echo "========================================"
          echo ""
          echo "✅ JSON Schema Validation"
          echo "✅ TFLint"
          echo "✅ Terraform Validation"
          echo "✅ Lambda Code Validation"
          echo ""
          echo "Ready to merge! 🚀"